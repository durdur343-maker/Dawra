<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f4f0 0%, #dae8da 100%);
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;

            padding: 1.5rem;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 10px 30px rgba(0,40,0,0.1);
        }

        .header h1 {
            font-size: 2.2rem;
            color: #1b3b1b;
            margin-bottom: 0.5rem;
        }

        .header h2 {
            font-size: 1.5rem;
            color: #2a5e2a;
            font-weight: 500;
        }

        .main-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: #256b2b;
            color: white;
            border: none;
            padding: 1rem 1.8rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0e3f13;
            transition: 0.1s;
            min-width: 180px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0e3f13;
        }

        .btn-awards {
            background: #9b2e2e;
            box-shadow: 0 6px 0 #631c1c;
        }
        
        .btn-awards:hover {
            background: #b63a3a;
        }

        .degree-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .degree-btn {
            background: white;
            border: 3px solid #2a5e2a;
            padding: 1.2rem 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1b3b1b;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 0 #1b4f1b;
            transition: 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        .degree-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #1b4f1b;
        }

        .degree-count {
            background: gold;
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.9rem;
            color: #1a3b1a;
        }

        .data-section {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
        }

        .data-section h3 {
            color: #1b4f1b;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            border-right: 8px solid #2a7a2a;
            padding-right: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #1b4f1b;
            color: white;
            padding: 12px;
            font-size: 1.1rem;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .back-btn {
            background: #8b8b8b;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            font-size: 1.2rem;
            margin-top: 1rem;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            font-size: 1.5rem;
            color: #2a5e2a;
        }

        .note {
            background: #fff3cd;
            border: 1px solid #856404;
            color: #856404;
            padding: 0.5rem;
            border-radius: 5px;
            margin: 1rem 0;
        }

        // قائمة الشهادات
        const degrees = ['الدكتوراه', 'الماجستير', 'دبلوم العالي', 'بكالوريوس', 'دبلوم', 'اعدادية', 'المتوسطة', 'الابتدائية', 'دون شهادة'];
        
        function getEmployeesByDegree() {
            let byDegree = {};
            degrees.forEach(deg => byDegree[deg] = []);
            
            employeesData.forEach(emp => {
                const deg = emp.degree;
                
                if (deg.includes('دكتوراه')) byDegree['الدكتوراه'].push(emp);
                else if (deg.includes('ماجستير')) byDegree['الماجستير'].push(emp);
                else if (deg.includes('دبلوم عالي')) byDegree['دبلوم العالي'].push(emp);
                else if (deg.includes('بكالوريوس') || deg.includes('بكلوريوس')) byDegree['بكالوريوس'].push(emp);
                else if (deg.includes('دبلوم') && !deg.includes('عالي')) byDegree['دبلوم'].push(emp);
                else if (deg.includes('اعدادية')) byDegree['اعدادية'].push(emp);
                else if (deg.includes('متوسطة')) byDegree['المتوسطة'].push(emp);
                else if (deg.includes('ابتدائية')) byDegree['الابتدائية'].push(emp);
                else byDegree['دون شهادة'].push(emp);
            });
            
            return byDegree;
        }

        // عرض أزرار الشهادات
        function renderDegreeButtons() {
            const container = document.getElementById('degreeButtons');
            container.innerHTML = '';
            
            const byDegree = getEmployeesByDegree();
            
            degrees.forEach(degree => {
                const count = byDegree[degree]?.length || 0;
                const btn = document.createElement('button');
                btn.className = 'degree-btn';
                btn.innerHTML = `
                    ${degree}
                    <span class="degree-count">${count}</span>
                `;
                btn.onclick = () => showDegreeData(degree);
                container.appendChild(btn);
            });
            
            document.getElementById('loading').style.display = 'none';
        }

        // عرض بيانات شهادة معينة
        function showDegreeData(degree) {
            const byDegree = getEmployeesByDegree();
            const employees = byDegree[degree] || [];
            
            document.getElementById('selectedDegreeTitle').textContent = `📋 ${degree} (${employees.length} منتسب)`;
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            employees.forEach((emp, index) => {
                const row = tbody.insertRow();
                row.insertCell().textContent = index + 1;
                row.insertCell().textContent = emp.name || '-';
                row.insertCell().textContent = (emp.specialization && emp.specialization !== '*' && emp.specialization !== 'نقل') ? emp.specialization : '-';
                row.insertCell().textContent = (emp.subSpecialization && emp.subSpecialization !== '*' && emp.subSpecialization !== 'نقل') ? emp.subSpecialization : '-';
                row.insertCell().textContent = emp.title || '-';
            });
            
            document.getElementById('dataSection').style.display = 'block';
        }

        function hideData() {
            document.getElementById('dataSection').style.display = 'none';
        }

        // تشغيل العرض عند تحميل الصفحة
        window.onload = renderDegreeButtons;
    </script>
</body>
</html>
